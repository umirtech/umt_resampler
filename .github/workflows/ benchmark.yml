name: Benchmark Update

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Run benchmark
        id: bench
        run: |
          OUTPUT=$(./build/benchmark bench)
          echo "$OUTPUT"
          
          CONFIG_LINE=$(echo "$OUTPUT" | grep SrcCh)
      
          SRC_CH=$(echo "$CONFIG_LINE" | sed -E 's/.*SrcCh=([0-9]+).*/\1/')
          DST_CH=$(echo "$CONFIG_LINE" | sed -E 's/.*DstCh=([0-9]+).*/\1/')
          SRC_RATE=$(echo "$CONFIG_LINE" | sed -E 's/.*SrcRate=([0-9]+).*/\1/')
          DST_RATE=$(echo "$CONFIG_LINE" | sed -E 's/.*DstRate=([0-9]+).*/\1/')
      
          SPS=$(echo "$OUTPUT" | grep SamplesPerSec | sed -E 's/.*SamplesPerSec=([0-9.]+).*/\1/')
          FPS=$(echo "$OUTPUT" | grep FramesPerSec | sed -E 's/.*FramesPerSec=([0-9.]+).*/\1/')
          RT=$(echo "$OUTPUT" | grep RealtimeFactor | sed -E 's/.*RealtimeFactor=([0-9.]+x).*/\1/')
      
          echo "SRC_CH=$SRC_CH" >> $GITHUB_ENV
          echo "DST_CH=$DST_CH" >> $GITHUB_ENV
          echo "SRC_RATE=$SRC_RATE" >> $GITHUB_ENV
          echo "DST_RATE=$DST_RATE" >> $GITHUB_ENV
          echo "SPS=$SPS" >> $GITHUB_ENV
          echo "FPS=$FPS" >> $GITHUB_ENV
          echo "RT=$RT" >> $GITHUB_ENV

      - name: Update readme
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          TABLE="| Config | Value |\n"
          TABLE="$TABLE|--------|------|\n"
          TABLE="$TABLE| Channels | ${SRC_CH} → ${DST_CH} |\n"
          TABLE="$TABLE| Sample Rate | ${SRC_RATE} → ${DST_RATE} |\n"
          TABLE="$TABLE| Samples/sec | ${SPS} |\n"
          TABLE="$TABLE| Frames/sec | ${FPS} |\n"
          TABLE="$TABLE| Realtime Factor | ${RT} |\n"
          TABLE="$TABLE| Last Updated | ${DATE} |\n"

          awk -v table="$TABLE" '
          BEGIN {print_flag=1}
          /<!-- BENCHMARK_START -->/ {
              print;
              print table;
              print_flag=0;
              next;
          }
          /<!-- BENCHMARK_END -->/ {
              print_flag=1;
          }
          print_flag {print}
          ' readme.md > readme.tmp && mv readme.tmp readme.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update benchmark results"
          title: "Auto: Update benchmark results"
          body: |
            This PR updates benchmark results automatically.
          branch: benchmark-update
          delete-branch: true
